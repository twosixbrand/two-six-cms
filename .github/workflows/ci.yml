name: CI — CMS (Tests & Cobertura)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: 🧪 Tests Unitarios & Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Ejecutar Tests con Cobertura
        run: npm run test:coverage
        continue-on-error: true
        env:
          NODE_ENV: test

      - name: 5. Subir Reporte de Cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-cms
          path: coverage/
          retention-days: 14

  lint:
    name: 🔍 Linting
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Ejecutar ESLint
        run: npm run lint
